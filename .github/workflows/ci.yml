name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: mypy backend streaming graph ml llm compliance
      - run: bandit -r backend streaming graph ml llm compliance -x tests,backend/.venv,frontend/node_modules,frontend/dist
      - run: python -m training.pipelines.train_artifacts
      - run: pytest tests/unit tests/model_regression

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - working-directory: frontend
        run: npm install
      - working-directory: frontend
        run: npm run build

  blue-green:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: echo "Run model regression, load tests, deploy green, switch traffic after smoke tests."
