apiVersion: batch/v1
kind: CronJob
metadata:
  name: fraud-watchlist-refresh
  namespace: fraud-detection
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: fraud-watchlist-refresh
        spec:
          restartPolicy: OnFailure
          containers:
            - name: watchlist-refresh
              image: fraud-detection-api:latest
              imagePullPolicy: IfNotPresent
              command: ["python", "-m", "compliance.watchlist_ingestion.refresh_job"]
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              envFrom:
                - secretRef:
                    name: fraud-secrets
