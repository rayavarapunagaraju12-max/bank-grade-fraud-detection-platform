apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-frontend
  namespace: fraud-detection
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-frontend
  template:
    metadata:
      labels:
        app: fraud-frontend
    spec:
      containers:
        - name: frontend
          image: fraud-detection-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-frontend
  namespace: fraud-detection
spec:
  type: LoadBalancer
  selector:
    app: fraud-frontend
  ports:
    - port: 80
      targetPort: 5173
