apiVersion: v1
kind: Secret
metadata:
  name: fraud-secrets
  namespace: fraud-detection
type: Opaque
stringData:
  JWT_SECRET: replace-with-secret-manager-value
  DEMO_API_KEY: replace-with-secret-manager-value
  ENABLE_API_KEY_AUTH: "true"
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  REDIS_URL: redis://redis:6379/0
  DATABASE_URL: postgresql+psycopg://fraud:<replace-with-db-password>@postgres:5432/fraud
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: replace-with-secret-manager-value
  MINIO_ACCESS_KEY: replace-with-secret-manager-value
  MINIO_SECRET_KEY: replace-with-secret-manager-value
  OLLAMA_BASE_URL: http://ollama:11434
